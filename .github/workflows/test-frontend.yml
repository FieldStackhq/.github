name: Frontend Tests (Reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      working-directory:
        description: 'Directory containing package.json'
        required: false
        type: string
        default: '.'
      run-e2e:
        description: 'Run Playwright E2E tests'
        required: false
        type: boolean
        default: false
      e2e-base-url:
        description: 'Base URL for E2E tests'
        required: false
        type: string
        default: 'http://localhost:3000'
    secrets:
      E2E_TEST_USER:
        description: 'E2E test user email'
        required: false
      E2E_TEST_PASSWORD:
        description: 'E2E test user password'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present

      - name: Run unit tests
        run: npx vitest run --reporter=verbose --coverage

      - name: Install Playwright
        if: inputs.run-e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: inputs.run-e2e
        run: npx playwright test
        env:
          BASE_URL: ${{ inputs.e2e-base-url }}
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: inputs.run-e2e && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ inputs.working-directory }}/playwright-report/
